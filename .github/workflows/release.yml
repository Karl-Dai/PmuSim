name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Frontend build is run by tauri's beforeBuildCommand inside tauri-action below.

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/pmusim-app
          tagName: ${{ github.ref_name }}
          releaseName: 'PmuSim ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            **PmuSim** — PMU 主站模拟器 / PMU Master Station Simulator

            | Platform | Asset pattern |
            |----------|---------------|
            | macOS (Apple Silicon) | `*_aarch64.dmg` |
            | macOS (Intel) | `*_x64.dmg` |
            | Linux (x64) | `*_amd64.deb` / `*_amd64.AppImage` |
            | Windows (x64) | `*_x64-setup.exe` / `*_x64_en-US.msi` |
          # Draft until all matrix jobs finish uploading; the `publish` job below
          # flips the draft off once every platform's assets are attached.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
